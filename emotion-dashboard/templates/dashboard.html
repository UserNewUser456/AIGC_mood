<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪愈疗平台 - 仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .api-list {
            list-style: none;
        }
        .api-list li {
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .api-list li a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .api-list li:hover {
            background: #e9ecef;
        }
        .status {
            text-align: center;
            padding: 20px;
            background: #d4edda;
            color: #155724;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">
            ✅ 服务运行正常 | 情绪愈疗平台 API
        </div>
        <h1>📊 情绪愈疗平台</h1>
        <h2>📋 可用 API 接口</h2>
        <ul class="api-list">
            <li><a href="/api/emotion/history?user_id=1&days=7">GET /api/emotion/history</a> - 获取历史情绪数据</li>
            <li><a href="/api/emotion/stats?user_id=1&days=7">GET /api/emotion/stats</a> - 获取情绪统计数据</li>
            <li><a href="/api/report/weekly?user_id=1">GET /api/report/weekly</a> - 获取周报</li>
            <li><a href="/api/knowledge?keyword=焦虑">GET /api/knowledge</a> - 搜索心理知识</li>
            <li><a href="/api/resources?emotion=焦虑">GET /api/resources</a> - 获取资源推荐</li>
        </ul>
        <p style="text-align: center; margin-top: 30px; color: #666;">
            使用说明：请使用 POST 请求创建用户和提交情绪数据
        </p>
    </div>
</body>
</html>
