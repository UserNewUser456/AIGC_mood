# Railway部署配置文件
# 参考: https://docs.railway.app/reference/config

[build]
builder = "nixpacks"
# 指定Python版本
[nixpacks]
pythonVersion = "3.11"

[deploy]
# 启动命令
startCommand = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app"
# 预启动命令（数据库迁移）
preDeploy = "python init_db.py"

# 环境变量
[env]
# Flask环境
FLASK_ENV = "production"
DEBUG = "false"

# 必需的环境变量（会在部署时提示填写）
# SECRET_KEY = "your-secret-key"
# JWT_SECRET_KEY = "your-jwt-secret"
# DATABASE_URL = "mysql+pymysql://..."
# DASHSCOPE_API_KEY = "your-api-key"

# 可选环境变量（带默认值）
# SMTP_SERVER = "smtp.qq.com"
# SMTP_PORT = "587"
# ALERT_EMAIL = "admin@example.com"

# 健康检查
[healthcheck]
path = "/health"
interval = 30
timeout = 10
